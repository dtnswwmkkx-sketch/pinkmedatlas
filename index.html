<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroAtlas Pro+</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>🔬 MicroAtlas Pro+ 🌸</header>

<nav>
<button onclick="show('scan')">Microscope</button>
<button onclick="show('game')">Game</button>
<button onclick="show('compare')">Compare</button>
</nav>

<!-- MICROSCOPE DRAG -->
<div id="scan" class="section active">
<h2>Slide Scanner</h2>
<div id="stage">
<img id="slide" src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Calcium_oxalate_crystals.jpg">
</div>
<p>Drag to scan specimen</p>
</div>

<!-- GAME -->
<div id="game" class="section">
<h2>Identify the Organism</h2>
<div id="gameBox"></div>
</div>

<!-- COMPARE -->
<div id="compare" class="section">
<h2>Comparison</h2>
<div class="compare">
<div>
<h3>Calcium Oxalate</h3>
<p class="acid">Acidic urine</p>
</div>
<div>
<h3>Triple Phosphate</h3>
<p class="alkaline">Alkaline urine</p>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
